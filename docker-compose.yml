services:
  android-server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    volumes:
      - ./server:/app
      - /app/node_modules
      - screenshots:/app/screenshots
      - ./server/android-project:/android-project
      - ./server/android-project/gradle:/root/.gradle
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - ANDROID_HOME=/opt/android-sdk
    restart: unless-stopped
    networks:
      - internal
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.android-server.tls=true"
      - "traefik.http.services.android-server.loadbalancer.server.port=4000"

  android-nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    volumes:
      - ./nginx/public:/usr/share/nginx/html/public:ro
      - screenshots:/usr/share/nginx/html/screenshots
    ports:
      - "4001:4001"
    restart: unless-stopped
    networks:
      - internal
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.android-nginx.tls=true"
      - "traefik.http.services.android-nginx.loadbalancer.server.port=4001"

volumes:
  screenshots:

networks:
  default:
  internal:
    internal: true
  proxy:
    external: true
