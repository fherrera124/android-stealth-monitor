services:
  android-server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./screenshots:/app/screenshots
      - ./server/android-project:/android-project
      - ./server/android-project/gradle:/root/.gradle
    environment:
      - NODE_ENV=production
      - ANDROID_HOME=/opt/android-sdk
    restart: unless-stopped
    networks:
      - internal
      - default

  android-portal:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/public:/usr/share/nginx/html:ro
      - ./screenshots:/usr/share/nginx/html/screenshots:ro
    ports:
      - "4001:4001"
    restart: unless-stopped
    networks:
      - internal
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.android-portal.tls=true"
      - "traefik.http.services.android-portal.loadbalancer.server.port=4001"

networks:
  default:
  internal:
    internal: true
  proxy:
    external: true
