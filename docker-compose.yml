volumes:
  react-build:

services:
  android-server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    volumes:
      - ./screenshots:/app/screenshots
      - ./server/android-project:/android-project
      - ./server/android-project/gradle:/root/.gradle
      - react-build:/app/nginx/public
    environment:
      - NODE_ENV=production
      - ANDROID_HOME=/opt/android-sdk
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/app/nginx/public/index.html"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks:
      - internal
      - default

  android-panel:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - react-build:/usr/share/nginx/html:ro
      - ./screenshots:/usr/share/nginx/screenshots:ro
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/usr/share/nginx/html/index.html"]
      interval: 2s
      timeout: 2s
      retries: 30
    depends_on:
      android-server:
        condition: service_healthy
    networks:
      - internal
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.android-panel.tls=true"
      - "traefik.http.services.android-panel.loadbalancer.server.port=4000"

networks:
  default:
  internal:
    internal: true
  proxy:
    external: true
