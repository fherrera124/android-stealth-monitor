services:
  android-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - internal
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.android-server.tls=true"
      - "traefik.http.services.android-server.loadbalancer.server.port=4000"

  android-portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    volumes:
      - ./portal:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - SERVER_URL=http://android-server:4000
    ports:
      - "4001:4001"
    restart: unless-stopped
    depends_on:
      - android-server
    networks:
      - internal
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.android-portal.tls=true"
      - "traefik.http.services.android-portal.loadbalancer.server.port=4001"

  android-builder:
    build:
      context: ./builder
      dockerfile: Dockerfile
    volumes:
      - ./builder/project:/project
      - ./builder/project/.gradle:/root/.gradle
    ports:
      - "8080:8080"
    environment:
      - ANDROID_HOME=/opt/android-sdk
    restart: unless-stopped
    networks:
      - internal
      - default
    stdin_open: true
    tty: true

volumes:
  devices-db:

networks:
  default:
  internal:
    internal: true
  proxy:
    external: true
