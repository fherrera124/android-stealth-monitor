server {
    listen 4001;
    server_name _;

    # Archivos estáticos del frontend
    root /usr/share/nginx/html;
    index index.html;

    # Servir archivos estáticos
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Screenshot images
    location /screenshots/ {
        alias /usr/share/nginx/html/screenshots/;
        expires 1h;
    }

    location /socket.io/ {
        # Reescribimos la URI para insertar el namespace /android 
        # antes de los parámetros de consulta (query strings)
        rewrite ^/socket.io/(.*)$ /android/socket.io/$1 break;

        proxy_pass http://android-server:4000;
        
        # Configuraciones estándar de WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers de host y IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Importante para evitar cortes en la conexión persistente
        proxy_read_timeout 86400;
    }
}