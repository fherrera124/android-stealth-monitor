server {
    listen 4001;
    server_name _;

    # Archivos estáticos del frontend
    root /usr/share/nginx/html;
    index index.html;

    # Servir archivos estáticos
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Screenshot images
    location /screenshots/ {
        alias /usr/share/nginx/html/screenshots/;
        expires 1h;
    }

    # Proxy de Socket.IO para el namespace /android (clientes Android)
    location /android {
        proxy_pass http://android-server:4000/android;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy de Socket.IO para el namespace /frontend (frontend web)
    # IMPORTANTE: Sin especificar el namespace en proxy_pass para mantener compatibilidad
    location /socket.io/ {
        proxy_pass http://android-server:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}